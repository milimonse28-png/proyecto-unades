title: SCReport – Schneider Consulting Thesis/Dissertation Template
author: Schneider | Consulting Firm
version: 1.0.0
quarto-required: ">=1.3.0"

contributes:
  formats:
    pdf:
      documentclass: report
      pdf-engine: xelatex
      number-sections: true
      toc: true
      toc-depth: 3
      lof: true
      lot: true
      highlight-style: tango
      fontsize: 12pt
      linestretch: 2
      papersize: a4
      geometry:
        - a4paper
        - top=25mm
        - bottom=25mm
        - left=25mm
        - right=25mm
      mainfont: "Times New Roman"
      sansfont: "Arial"
      monofont: "Courier New"
      colorlinks: false
      linkcolor: black
      urlcolor: black
      citecolor: black
      cite-method: biblatex
      biblio-style: apa
      biblatexoptions:
        - backend=biber
        - uniquename=false
        - uniquelist=false
      lang: es
      babel-lang: spanish
      include-in-header:
        - file: partials/preamble.tex
      template-partials:
        - partials/title.tex
        - partials/before-body.tex

    html:
      theme: cosmo
      #css: screport.css
      fontsize: 14
      linestretch: 1.5
      toc: true
      toc-depth: 3
      toc-location: left
      toc-title: "Contenido"
      number-sections: true
      highlight-style: github
      code-fold: true
      code-summary: "Ver código"
      code-overflow: scroll
      fig-align: center
      cap-location: bottom
      lang: es
      language:
        title-block-published: "Actualizado"
      self-contained: true
      smooth-scroll: true
      anchor-sections: true
      citations-hover: true
      footnotes-hover: true
      link-external-icon: true
      link-external-newwindow: true
